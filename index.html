<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 3em;
        }

        p {
            font-size: 1.2em;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: white;
            color: #333;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #333;
            color: white;
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Welcome to My Website</h1>
        <p>This is my first static website deployed for free!</p>

        <a href="#" class="btn">Learn More</a>
    </div>

    <footer>
        © 2026 Your Name | Hosted for free
    </footer>

</body>
</html>
